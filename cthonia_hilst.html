<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cthonia hilst</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#faf9f7;color:#1a1a1a;
  font-family:Georgia,serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:60px 20px 80px;
}
header{text-align:center;margin-bottom:52px}
h1{font-size:20px;font-weight:normal;letter-spacing:0.1em;margin-bottom:8px}
header p{font-size:13px;color:#888;font-style:italic}
.divider{width:60px;height:1px;background:#bbb;margin:14px auto}

.card{width:100%;max-width:380px;display:flex;flex-direction:column;align-items:center;gap:36px}

/* cross grid */
.big-grid{
  display:grid;grid-template-columns:1fr 1fr;
  width:200px;height:200px;
  position:relative;background:transparent;
}
.big-grid::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:1px;background:#999;transform:translateX(-50%)}
.big-grid::after{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:#999;transform:translateY(-50%)}

.quad{
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;z-index:1;
  transition:background 0.15s;user-select:none;
}
.quad:hover{background:rgba(0,0,0,0.03)}
.quad svg{pointer-events:none;transition:color 0.2s;color:#ccc}
.quad.filled svg{color:#1a1a1a}
.quad .dot{font-size:28px;color:#ccc;pointer-events:none}

.vesica-lg{width:36px;height:52px}
.tilde-lg{width:44px;height:24px}
.slash-lg{width:28px;height:44px}
.circle-lg{width:40px;height:40px}

/* popup */
.popup{
  position:fixed;background:#fff;border:1px solid #bbb;
  display:none;flex-direction:column;z-index:200;
  box-shadow:0 4px 16px rgba(0,0,0,0.1);min-width:150px;
}
.popup.open{display:flex}
.popup-item{
  padding:10px 16px;cursor:pointer;color:#1a1a1a;
  transition:background 0.1s;display:flex;align-items:center;gap:12px;font-size:13px;
}
.popup-item:hover{background:#f5f2ed}
.popup-item .p-icon{width:24px;display:flex;align-items:center;justify-content:center}
.popup-item .p-icon svg{width:16px;height:24px}
.popup-item .p-icon.tilde svg{width:22px;height:12px}
.popup-item .p-icon.slash svg{width:14px;height:22px}
.popup-item .p-icon.circle svg{width:20px;height:20px}
.popup-item .label{color:#999;font-size:11px;letter-spacing:0.1em;font-style:italic}
.popup-clear{
  font-size:11px;padding:8px 16px;color:#bbb;cursor:pointer;
  border-top:1px solid #eee;font-style:italic;transition:color 0.1s;
}
.popup-clear:hover{color:#1a1a1a}

/* consult button — smaller */
.consult-btn{
  background:transparent;border:1px solid #1a1a1a;
  color:#1a1a1a;font-family:Georgia,serif;font-size:11px;letter-spacing:0.18em;
  padding:8px 24px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;
}
.consult-btn:hover:not(:disabled){background:#1a1a1a;color:#faf9f7}
.consult-btn:disabled{opacity:0.2;cursor:not-allowed}

/* result */
.result{width:100%;max-width:380px;margin-top:16px;display:none}
.result.show{display:block}
.result-inner{border-top:1px solid #1a1a1a;padding-top:28px}
.res-top{display:flex;align-items:center;gap:20px;margin-bottom:20px}

/* bigger result grid */
.res-mini{
  display:grid;grid-template-columns:1fr 1fr;
  width:80px;height:80px;position:relative;flex-shrink:0;
}
.res-mini::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:1px;background:#bbb;transform:translateX(-50%)}
.res-mini::after{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:#bbb;transform:translateY(-50%)}
.res-cell{display:flex;align-items:center;justify-content:center;position:relative;z-index:1}
.res-cell svg{color:#1a1a1a}
.rc-vesica{width:18px;height:26px}
.rc-tilde{width:24px;height:13px}
.rc-slash{width:15px;height:24px}
.rc-circle{width:21px;height:21px}

.res-num{font-size:44px;font-weight:normal;color:#1a1a1a;line-height:1}
.res-msg{font-size:17px;font-style:italic;line-height:1.8;color:#1a1a1a}
.res-msg.empty{color:#aaa;font-size:13px}
.reset-btn{
  display:block;margin:20px auto 0;background:transparent;border:none;
  color:#999;font-family:Georgia,serif;font-size:12px;letter-spacing:0.1em;
  cursor:pointer;text-decoration:underline;text-underline-offset:3px;transition:color 0.2s;
}
.reset-btn:hover{color:#1a1a1a}
</style>
</head>
<body>

<header>
  <h1>cthonia hilst</h1>
</header>

<div class="card">
  <div class="big-grid" id="bigGrid">
    <div class="quad" id="q0" data-pos="0"><span class="dot">·</span></div>
    <div class="quad" id="q1" data-pos="1"><span class="dot">·</span></div>
    <div class="quad" id="q2" data-pos="2"><span class="dot">·</span></div>
    <div class="quad" id="q3" data-pos="3"><span class="dot">·</span></div>
  </div>

  <div class="popup" id="popup">
    <div class="popup-item" data-sym="V">
      <span class="p-icon"><svg viewBox="0 0 16 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1 C1 6, 1 18, 8 23 C15 18, 15 6, 8 1 Z"/></svg></span>
      <span class="label">Semente</span>
    </div>
    <div class="popup-item" data-sym="T">
      <span class="p-icon tilde"><svg viewBox="0 0 22 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 8 C4 3, 8 3, 11 6 C14 9, 18 9, 21 4"/></svg></span>
      <span class="label">Volúpia</span>
    </div>
    <div class="popup-item" data-sym="S">
      <span class="p-icon slash"><svg viewBox="0 0 14 22" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="11" y1="2" x2="3" y2="20"/></svg></span>
      <span class="label">Osso</span>
    </div>
    <div class="popup-item" data-sym="O">
      <span class="p-icon circle"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="8"/></svg></span>
      <span class="label">Buraco</span>
    </div>
    <div class="popup-clear" id="popupClear">limpar</div>
  </div>

  <button class="consult-btn" id="consultBtn" disabled>Consultar</button>
</div>

<div class="result" id="result">
  <div class="result-inner">
    <div class="res-top">
      <div class="res-mini">
        <div class="res-cell" id="rp0"></div>
        <div class="res-cell" id="rp1"></div>
        <div class="res-cell" id="rp2"></div>
        <div class="res-cell" id="rp3"></div>
      </div>
      <div class="res-num" id="rNum"></div>
    </div>
    <div class="res-msg" id="rMsg"></div>
  </div>
  <button class="reset-btn" onclick="reset()">← nova consulta</button>
</div>

<script>
const SYMS=['V','T','S','O'];
const RANK={V:0,T:1,S:2,O:3};

function svgLarge(s){
  if(s==='V')return`<svg class="vesica-lg" viewBox="0 0 36 52" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 2 C2 12, 2 40, 18 50 C34 40, 34 12, 18 2 Z"/></svg>`;
  if(s==='T')return`<svg class="tilde-lg" viewBox="0 0 44 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 16 C8 5, 16 5, 22 12 C28 19, 36 19, 42 8"/></svg>`;
  if(s==='S')return`<svg class="slash-lg" viewBox="0 0 28 44" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="22" y1="3" x2="6" y2="41"/></svg>`;
  if(s==='O')return`<svg class="circle-lg" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="20" cy="20" r="16"/></svg>`;
  return`<span class="dot">·</span>`;
}
function svgSmall(s){
  if(s==='V')return`<svg class="rc-vesica" viewBox="0 0 16 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1 C1 6, 1 18, 8 23 C15 18, 15 6, 8 1 Z"/></svg>`;
  if(s==='T')return`<svg class="rc-tilde" viewBox="0 0 22 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 8 C4 3, 8 3, 11 6 C14 9, 18 9, 21 4"/></svg>`;
  if(s==='S')return`<svg class="rc-slash" viewBox="0 0 14 22" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="11" y1="2" x2="3" y2="20"/></svg>`;
  if(s==='O')return`<svg class="rc-circle" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="8"/></svg>`;
  return'';
}

// build 256 ordered
const all=[];
for(let i=0;i<256;i++)all.push([0,1,2,3].map(p=>SYMS[(i>>(6-2*p))&3]));
const pures=SYMS.map(s=>[s,s,s,s]);
const fkey=f=>f.join('');
function hamming(a,b){return a.reduce((n,v,i)=>n+(v!==b[i]?1:0),0)}
const ordered=[];const seen=new Set();
pures.forEach(p=>{ordered.push({fig:p,dist:0});seen.add(fkey(p))});
for(let d=1;d<=3;d++){
  pures.forEach((pure,ci)=>{
    const base=pure[0];
    all.filter(f=>!seen.has(fkey(f))&&hamming(f,pure)===d)
       .sort((a,b)=>{
         const ap=a[ci]===base?0:1, bp=b[ci]===base?0:1;
         if(ap!==bp)return ap-bp;
         for(let i=0;i<4;i++){if(RANK[a[i]]!==RANK[b[i]])return RANK[a[i]]-RANK[b[i]]}
         return 0;
       })
       .forEach(f=>{ordered.push({fig:f,dist:d});seen.add(fkey(f))});
  });
}
const lookup={};
ordered.forEach((e,i)=>{lookup[fkey(e.fig)]=i});

const MESSAGES=[

];

const sel=[null,null,null,null];
let activePos=null;
const popup=document.getElementById('popup');

function updateQuad(pos){
  const q=document.getElementById('q'+pos);
  const s=sel[pos];
  q.innerHTML=s?svgLarge(s):`<span class="dot">·</span>`;
  s?q.classList.add('filled'):q.classList.remove('filled');
}
function closePopup(){popup.classList.remove('open');activePos=null}

[0,1,2,3].forEach(pos=>{
  document.getElementById('q'+pos).addEventListener('click',e=>{
    e.stopPropagation();
    if(activePos===pos){closePopup();return}
    activePos=pos;
    const qr=document.getElementById('q'+pos).getBoundingClientRect();
    document.body.appendChild(popup);
    popup.style.position='fixed';
    let left=qr.right+6;
    if(left+160>window.innerWidth)left=qr.left-166;
    popup.style.left=left+'px';
    popup.style.top=qr.top+'px';
    popup.classList.add('open');
  });
});

document.querySelectorAll('.popup-item').forEach(item=>{
  item.addEventListener('click',e=>{
    e.stopPropagation();
    if(activePos===null)return;
    sel[activePos]=item.dataset.sym;
    updateQuad(activePos);
    closePopup();
    document.getElementById('consultBtn').disabled=sel.some(s=>!s);
  });
});
document.getElementById('popupClear').addEventListener('click',e=>{
  e.stopPropagation();
  if(activePos===null)return;
  sel[activePos]=null;
  updateQuad(activePos);
  closePopup();
  document.getElementById('consultBtn').disabled=true;
});
document.addEventListener('click',closePopup);

document.getElementById('consultBtn').addEventListener('click',()=>{
  const idx=lookup[sel.join('')];
  const entry=ordered[idx];
  document.getElementById('rNum').textContent=idx+1;
  entry.fig.forEach((s,i)=>{document.getElementById('rp'+i).innerHTML=svgSmall(s)});
  const msgEl=document.getElementById('rMsg');
  const msg=MESSAGES[idx]||'';
  if(!msg){msgEl.textContent='(mensagem ainda não escrita)';msgEl.classList.add('empty');}
  else{msgEl.textContent=msg;msgEl.classList.remove('empty');}
  const res=document.getElementById('result');
  res.classList.add('show');
  setTimeout(()=>res.scrollIntoView({behavior:'smooth',block:'start'}),100);
});

function reset(){
  sel.fill(null);
  [0,1,2,3].forEach(updateQuad);
  document.getElementById('consultBtn').disabled=true;
  document.getElementById('result').classList.remove('show');
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
